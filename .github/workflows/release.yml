name: Helix-Hamiltonian Release
on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0b2)

env:
  # 🚀 FORCE JAVASCRIPT ACTIONS TO NODE 24
  # Prevents substrate deprecation and ensures high-velocity execution.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 🧪 SUBSTRATE SANITIZATION
      # Force-purges UTF-8 BOM and Windows CRLF to prevent Parser Fracture
      - name: Sanitizing Substrate
        run: |
          sed -i '1s/^\xEF\xBB\xBF//' pyproject.toml
          sed -i 's/\r$//' pyproject.toml
          echo "✅ Substrate sanitized: BOM and CRLF removed."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Build Dependencies
        run: python -m pip install --upgrade pip build pytest

      # 🔬 THE SUBSTRATE AUDIT
      - name: Run Red Team Audit
        run: pytest tests/test_red_team_audit.py

      # 🛡️ THE FEYNMAN SHIELD CHECK
      - name: Run Feynman Shield Test
        run: pytest tests/test_feynman_shield.py

      - name: Build Package
        run: python -m build

      - name: Store Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    needs: audit-and-build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Required for Trusted Publishing
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Build Package
        run: python -m build

      - name: Store Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    needs: audit-and-build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Required for Trusted Publishing
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
