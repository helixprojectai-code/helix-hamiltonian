  hamiltonian-physics:
    name: Hknot Quantum Bounds (Unit Tests)
    runs-on: ubuntu-latest
    needs: schema-compliance
    steps:
      - uses: actions/checkout@v4
      - name: Set up Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Hamiltonian Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Verify Form Axis (H_free)
        run: pytest tests/physics/test_h_free.py -v
        
      - name: Verify Velocity Axis (H_fold)
        run: pytest tests/physics/test_h_fold.py -v
        
      - name: Verify Ratification Shield (H_topo)
