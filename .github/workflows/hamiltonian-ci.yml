  schema-compliance:
    name: RFC 0001 Metadata Compliance
    runs-on: ubuntu-latest
    needs: gicd-epistemic-scan
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
